<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirate Bay Bunker Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=MedievalSharp&family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #f97316;
    --accent2: #38bdf8;
    --fuel: #f97316;
    --co2: #34d399;
    --text: #e2e8f0;
    --muted: #64748b;
    --highlight-bg: rgba(249,115,22,0.15);
    --highlight-border: #f97316;
    --row-alt: rgba(255,255,255,0.02);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'IM Fell English', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 10px rgba(249,115,22,0.2);
  }
  .logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; font-family: 'Pirata One', cursive; font-size: 1.3rem; }
  .logo-text span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    padding: 4px 10px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 600; color: var(--co2);
    font-family: 'Share Tech Mono', monospace;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--co2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Main */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* Date + stat bar */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
  }
  .date-block h1 {
    font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1;
  }
  .date-block .subtitle {
    font-size: 0.8rem; color: var(--muted); margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }
  .stat-pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 14px;
    box-shadow: inset 0 1px 0 rgba(249,115,22,0.04);
    display: flex; flex-direction: column; gap: 2px;
    min-width: 90px;
  }
  .stat-pill .label { font-size: 0.65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-pill .val { font-size: 1rem; font-weight: 700; font-family: 'Share Tech Mono', monospace; }
  .stat-pill.fuel .val { color: var(--fuel); }
  .stat-pill.co2 .val { color: var(--co2); }

  /* Day selector */
  .day-selector-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: inset 0 1px 0 rgba(249,115,22,0.05);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .day-selector-label { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .day-btns { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .day-btn {
    min-width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text); font-family: 'IM Fell English', serif;
    font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--accent); }
  .day-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: white;
  }
  .day-btn.today-day {
    border-color: var(--co2); color: var(--co2);
  }
  .day-btn.today-day.active {
    background: var(--co2); border-color: var(--co2); color: #0a0e1a;
  }

  /* Current time row info */
  .current-info {
    background: var(--highlight-bg);
    border: 1px solid rgba(249,115,22,0.3);
    border-radius: 10px; padding: 10px 16px;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 12px;
    font-size: 0.85rem; flex-wrap: wrap; gap: 8px;
  }
  .current-info .ci-label { color: var(--muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .current-info .ci-time { font-family: 'Share Tech Mono', monospace; font-weight: 600; color: var(--accent); font-size: 1rem; }
  .current-info .ci-prices { display: flex; gap: 16px; margin-left: auto; }
  .current-info .ci-price { display: flex; flex-direction: column; align-items: flex-end; }
  .current-info .ci-price .ci-plabel { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .current-info .ci-price .ci-pval { font-family: 'Share Tech Mono', monospace; font-weight: 700; font-size: 1rem; }
  .ci-fuel { color: var(--fuel); }
  .ci-co2c { color: var(--co2); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.3), inset 0 0 60px rgba(0,0,0,0.2);
    position: relative;
  }
  .table-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .table-header {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr;
    padding: 10px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--accent);
    font-family: 'Pirata One', cursive; font-size: 0.85rem;
  }
  .table-header div:not(:first-child) { text-align: right; }

  .table-body { max-height: 600px; overflow-y: auto; }
  .table-body::-webkit-scrollbar { width: 6px; }
  .table-body::-webkit-scrollbar-track { background: transparent; }
  .table-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .table-row {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    align-items: center;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row.alt { background: var(--row-alt); }
  .table-row:hover { background: rgba(249,115,22,0.05); }
  .table-row.current-row {
    background: var(--highlight-bg) !important;
    border-left: 3px solid var(--highlight-border);
    padding-left: 17px;
  }

  .time-cell {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .now-tag {
    background: var(--accent); color: #0d0a06; font-family: 'Pirata One', cursive;
    font-size: 0.55rem; font-weight: 700; padding: 2px 5px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .price-cell {
    text-align: right;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.88rem; font-weight: 600;
  }
  .price-cell.fuel-col { color: var(--fuel); }
  .price-cell.co2-col { color: var(--co2); }
  .current-row .price-cell { font-weight: 700; font-size: 0.95rem; }

  /* Summary section */
  .summary-section { margin-top: 2.5rem; }
  .section-title {
    font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; font-family: 'Pirata One', cursive;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .summary-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .summary-card.active-card { border-color: var(--accent); background: var(--highlight-bg); }
  .summary-card .card-day { font-size: 0.65rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .summary-card .card-prices { display: flex; flex-direction: column; gap: 3px; }
  .summary-card .card-price {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.75rem;
  }
  .summary-card .card-price .cp-label { color: var(--muted); font-size: 0.65rem; }
  .summary-card .card-price .cp-val { font-family: 'Share Tech Mono', monospace; font-weight: 600; }
  .cp-fuel { color: var(--fuel); }
  .cp-co2 { color: var(--co2); }

  .tz-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px; border-radius: 8px;
    font-family: 'IM Fell English', serif; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: border 0.2s; outline: none;
  }
  .tz-select:hover, .tz-select:focus { border-color: var(--accent); }

  .footer {
    margin-top: 3rem; padding: 1.5rem 0;
    border-top: 1px solid var(--border);
    text-align: center; font-size: 0.75rem; color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  @media (max-width: 600px) {
    .container { padding: 1rem; }
    .header { padding: 0 1rem; }
    .top-bar { flex-direction: column; align-items: flex-start; }
    .current-info { flex-direction: column; align-items: flex-start; }
    .current-info .ci-prices { margin-left: 0; }
  }
</style>
</head>

</div>

let currentDay = new Date().getUTCDate();
let selectedDay = currentDay;
let isDark = true;
let clockInterval;
let lastSlotIndex = -1;
let tzOffset = 0;

const TIMEZONES = [
  { label: 'GMT+0 — London, Reykjavik',       offset: 0 },
  { label: 'GMT+1 — Paris, Berlin, Madrid',    offset: 1 },
  { label: 'GMT+2 — Athens, Cairo, Helsinki',  offset: 2 },
  { label: 'GMT+3 — Moscow, Nairobi, Riyadh',  offset: 3 },
  { label: 'GMT+4 — Dubai, Baku',              offset: 4 },
  { label: 'GMT+5 — Karachi, Tashkent',        offset: 5 },
  { label: 'GMT+5:30 — Mumbai, New Delhi',     offset: 5.5 },
  { label: 'GMT+6 — Dhaka, Almaty',            offset: 6 },
  { label: 'GMT+7 — Bangkok, Jakarta',         offset: 7 },
  { label: 'GMT+8 — Beijing, Singapore, Perth',offset: 8 },
  { label: 'GMT+9 — Tokyo, Seoul',             offset: 9 },
  { label: 'GMT+10 — Sydney, Brisbane',        offset: 10 },
  { label: 'GMT+12 — Auckland, Fiji',          offset: 12 },
  { label: 'GMT-1 — Azores, Cape Verde',       offset: -1 },
  { label: 'GMT-2 — South Georgia',            offset: -2 },
  { label: 'GMT-3 — São Paulo, Buenos Aires',  offset: -3 },
  { label: 'GMT-4 — Halifax, Caracas',         offset: -4 },
  { label: 'GMT-5 — New York, Toronto',        offset: -5 },
  { label: 'GMT-6 — Chicago, Mexico City',     offset: -6 },
  { label: 'GMT-7 — Denver, Phoenix',          offset: -7 },
  { label: 'GMT-8 — Los Angeles, Vancouver',   offset: -8 },
  { label: 'GMT-9 — Anchorage',                offset: -9 },
  { label: 'GMT-10 — Honolulu',                offset: -10 },
];

function buildTzDropdown() {
  const sel = document.getElementById('tzSelect');
  TIMEZONES.forEach(tz => {
    const opt = document.createElement('option');
    opt.value = tz.offset;
    opt.textContent = tz.label;
    if (tz.offset === 0) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setTimezone(val) {
  tzOffset = parseFloat(val);
  const tz = TIMEZONES.find(t => t.offset === tzOffset);
  const label = tz ? tz.label.split(' — ')[0] : 'GMT+0';
  document.getElementById('liveBadgeLabel').textContent = label + ' LIVE';
  document.getElementById('tableHeaderTime').textContent = 'Time Interval (' + label + ')';
  lastSlotIndex = -1;
  renderTable();
  updateCurrentInfo();
  updateHeader();
}

function getLocalTime() {
  // Returns a Date adjusted to the selected timezone offset
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utcMs + tzOffset * 3600000);
}

function getCurrentSlotIndex() {
  // Always use UTC/GMT to find the correct data row — timezone only affects the label
  const now = new Date();
  const h = now.getUTCHours(), m = now.getUTCMinutes();
  return h * 2 + (m >= 30 ? 1 : 0);
}

function getLocalDay() {
  // Data is in GMT — use UTC date for day selection
  return new Date().getUTCDate();
}

function formatLocalTime(opts) {
  const local = getLocalTime();
  return local.toLocaleTimeString('en-GB', opts);
}

function formatLocalDate(opts) {
  const local = getLocalTime();
  return local.toLocaleDateString('en-GB', opts);
}

function fmt(n) { return '$' + n.toLocaleString(); }

function getStats(day) {
  const d = DATA.find(x => x.day === day);
  if (!d) return null;
  const fuels = d.intervals.map(i => i.fuel);
  const co2s  = d.intervals.map(i => i.co2);
  return {
    fuelMin: Math.min(...fuels), fuelMax: Math.max(...fuels),
    fuelAvg: Math.round(fuels.reduce((a,b)=>a+b,0)/fuels.length),
    co2Min:  Math.min(...co2s),  co2Max:  Math.max(...co2s),
    co2Avg:  Math.round(co2s.reduce((a,b)=>a+b,0)/co2s.length),
  };
}

function updateHeader() {
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('dateHeading').textContent = formatLocalDate(opts);
  const tz = TIMEZONES.find(t => t.offset === tzOffset);
  const tzLabel = tz ? tz.label.split(' — ')[0] : 'GMT';
  document.getElementById('dateSubtitle').textContent =
    `${tzLabel} ${formatLocalTime({hour:'2-digit', minute:'2-digit', second:'2-digit'})} · Day ${getLocalDay()} of month`;

  const s = getStats(currentDay);
  if (s) {
    document.getElementById('statPills').innerHTML = `
      <div class="stat-pill fuel"><div class="label">Fuel Today Avg</div><div class="val">${fmt(s.fuelAvg)}</div></div>
      <div class="stat-pill fuel"><div class="label">Fuel Today Min</div><div class="val">${fmt(s.fuelMin)}</div></div>
      <div class="stat-pill fuel"><div class="label">Fuel Today Max</div><div class="val">${fmt(s.fuelMax)}</div></div>
      <div class="stat-pill co2"><div class="label">CO₂ Today Avg</div><div class="val">${fmt(s.co2Avg)}</div></div>
    `;
  }
}

function updateCurrentInfo() {
  const d = DATA.find(x => x.day === selectedDay);
  if (!d) return;
  const idx = selectedDay === getLocalDay() ? getCurrentSlotIndex() : null;
  const iv = idx !== null ? d.intervals[idx] : null;

  if (iv) {
    const end = d.intervals[(idx + 1) % 48]?.start || '00:00';
    const ciStart = shiftTimeLabel(iv.start, tzOffset);
    const ciEnd   = shiftTimeLabel(end, tzOffset);
    document.getElementById('currentInfo').innerHTML = `
      <div><div class="ci-label">Current Interval</div><div class="ci-time">⏱ ${ciStart} – ${ciEnd}</div></div>
      <div class="ci-prices">
        <div class="ci-price"><div class="ci-plabel">Fuel</div><div class="ci-pval ci-fuel">${fmt(iv.fuel)}</div></div>
        <div class="ci-price"><div class="ci-plabel">CO₂</div><div class="ci-pval ci-co2c">${fmt(iv.co2)}</div></div>
      </div>
    `;
    document.getElementById('currentInfo').style.display = 'flex';
  } else {
    document.getElementById('currentInfo').style.display = 'none';
  }
}

function shiftTimeLabel(timeStr, offsetHours) {
  const [h, m] = timeStr.split(':').map(Number);
  const totalMins = h * 60 + m + Math.round(offsetHours * 60);
  const wrapped = ((totalMins % 1440) + 1440) % 1440; // wrap around 24h
  const nh = Math.floor(wrapped / 60);
  const nm = wrapped % 60;
  return String(nh).padStart(2,'0') + ':' + String(nm).padStart(2,'0');
}

function renderTable() {
  const d = DATA.find(x => x.day === selectedDay);
  if (!d) return;
  const currentIdx = selectedDay === getLocalDay() ? getCurrentSlotIndex() : -1;
  const body = document.getElementById('tableBody');

  // Only shift time labels — prices stay fixed to their GMT row
  body.innerHTML = d.intervals.map(function(iv, i) {
    var isCurrent = (i === currentIdx);
    var off = tzOffset; // capture current offset
    var shiftedStart = shiftTimeLabel(iv.start, off);
    var shiftedEnd = shiftTimeLabel(d.intervals[(i + 1) % 48].start, off);
    var cls = 'table-row' + (i%2 ? ' alt' : '') + (isCurrent ? ' current-row' : '');
    var nowTag = isCurrent ? '<span class="now-tag">NOW</span> ' : '';
    return '<div class="' + cls + '">' +
      '<div class="time-cell">' + nowTag + shiftedStart + ' – ' + shiftedEnd + '</div>' +
      '<div class="price-cell fuel-col">' + fmt(iv.fuel) + '</div>' +
      '<div class="price-cell co2-col">' + fmt(iv.co2) + '</div>' +
      '</div>';
  }).join('');

  // Scroll to current row
  if (currentIdx >= 0) {
    setTimeout(() => {
      const currentRow = body.querySelector('.current-row');
      if (currentRow) currentRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function renderDayButtons() {
  const wrap = document.getElementById('dayBtns');
  wrap.innerHTML = DATA.map(d => {
    const isToday = d.day === currentDay;
    const isActive = d.day === selectedDay;
    return `<button class="day-btn${isToday?' today-day':''}${isActive?' active':''}"
      onclick="selectDay(${d.day})">${d.day}</button>`;
  }).join('');
}

function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = DATA.map(d => {
    const s = getStats(d.day);
    const isActive = d.day === selectedDay;
    return `<div class="summary-card${isActive?' active-card':''}" onclick="selectDay(${d.day})">
      <div class="card-day">Day ${d.day}${d.day === currentDay ? ' · Today' : ''}</div>
      <div class="card-prices">
        <div class="card-price"><span class="cp-label">Fuel avg</span><span class="cp-val cp-fuel">${fmt(s.fuelAvg)}</span></div>
        <div class="card-price"><span class="cp-label">CO₂ avg</span><span class="cp-val cp-co2">${fmt(s.co2Avg)}</span></div>
      </div>
    </div>`;
  }).join('');
}

function selectDay(day) {
  selectedDay = day;
  renderDayButtons();
  renderTable();
  renderSummary();
  updateCurrentInfo();
}

function tick() {
  const newDay = getLocalDay();
  if (newDay !== currentDay) {
    currentDay = newDay;
    if (selectedDay === currentDay - 1) selectDay(currentDay);
  }
  updateHeader();
  updateCurrentInfo();

  // Only re-render table if the 30-min slot has actually changed
  if (selectedDay === currentDay) {
    const slotNow = getCurrentSlotIndex();
    if (slotNow !== lastSlotIndex) {
      lastSlotIndex = slotNow;
      renderTable();
    }
  }

  document.getElementById('footer').textContent =
    `Last updated: ${formatLocalTime({hour:'2-digit', minute:'2-digit', second:'2-digit'})} · All prices in USD · Data covers ${DATA.length} days`;
}

// Init
buildTzDropdown();
lastSlotIndex = getCurrentSlotIndex();
currentDay = getLocalDay();
selectedDay = currentDay;
updateHeader();
renderDayButtons();
updateCurrentInfo();
renderTable();
renderSummary();
document.getElementById('footer').textContent = `All prices in USD · Data covers ${DATA.length} days`;
clockInterval = setInterval(tick, 1000);
</script>
</body>
